name: CI - API

on:
  push:
    branches: [main]
    paths:
      - "backend/cmd/api/**"
      - "backend/internal/handler/api/**"
      - "backend/internal/library/**"
      - "backend/go.mod"
      - "backend/go.sum"
      - "backend/Makefile"
      - "backend/.golangci.yml"
      - ".github/workflows/ci-api.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/cmd/api/**"
      - "backend/internal/handler/api/**"
      - "backend/internal/library/**"
      - "backend/go.mod"
      - "backend/go.sum"
      - "backend/Makefile"
      - "backend/.golangci.yml"
      - ".github/workflows/ci-api.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node.js 24 がデフォルト化される 2026-06-02 以降は削除可

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "backend/go.mod"
          cache-dependency-path: "backend/go.sum"

      - name: Cache golangci-lint binary
        uses: actions/cache@v4
        id: cache-golangci-lint
        with:
          path: ~/go/bin/golangci-lint
          key: ${{ runner.os }}-golangci-lint-v2.12.2

      - name: Install golangci-lint
        if: steps.cache-golangci-lint.outputs.cache-hit != 'true'
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Cache golangci-lint analysis
        uses: actions/cache@v4
        with:
          path: ~/.cache/golangci-lint
          key: ${{ runner.os }}-golangci-lint-cache-${{ hashFiles('backend/.golangci.yml', 'backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-golangci-lint-cache-

      - name: Lint
        run: make lint

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "backend/go.mod"
          cache-dependency-path: "backend/go.sum"

      - name: Build
        run: make build

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "backend/go.mod"
          cache-dependency-path: "backend/go.sum"

      - name: Test
        run: make test
