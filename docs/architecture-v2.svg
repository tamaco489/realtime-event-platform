<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" width="1200" height="780">
<defs>
  <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#4a9eed"/>
  </marker>
  <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
  </marker>
  <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
  </marker>
  <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
  </marker>
  <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#0891b2"/>
  </marker>
  <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
  </marker>
</defs>

<!-- Background -->
<rect x="0" y="0" width="1200" height="780" fill="#ffffff"/>

<!-- Zone: Frontend (blue) -->
<rect x="10" y="10" width="1180" height="208" rx="20"
  fill="#dbe4ff" fill-opacity="0.45" stroke="#748fdb" stroke-width="1.5" stroke-opacity="0.5"/>
<!-- Zone: Backend API (purple) -->
<rect x="10" y="232" width="1180" height="175" rx="20"
  fill="#e5dbff" fill-opacity="0.45" stroke="#9775db" stroke-width="1.5" stroke-opacity="0.5"/>
<!-- Zone: Backend Event (green) -->
<rect x="10" y="420" width="1180" height="345" rx="20"
  fill="#d3f9d8" fill-opacity="0.45" stroke="#3db75a" stroke-width="1.5" stroke-opacity="0.5"/>

<!-- Zone labels -->
<text x="28" y="29" font-size="12" font-weight="700" fill="#4b6cb7" letter-spacing="1"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">Frontend</text>
<text x="28" y="251" font-size="12" font-weight="700" fill="#6b3db7" letter-spacing="1"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">Backend - API</text>
<text x="28" y="439" font-size="12" font-weight="700" fill="#1a7a30" letter-spacing="1"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">Backend - Event (Asynchronous)</text>

<!-- ===== NODES ===== -->

<!-- CloudFront + S3 -->
<rect x="40" y="68" width="220" height="80" rx="12"
  fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
<text x="150" y="103" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">CloudFront + S3</text>
<text x="150" y="121" text-anchor="middle" font-size="11" fill="#475569"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">静的ホスティング</text>

<!-- Cognito User Pool (NEW) -->
<rect x="453" y="68" width="220" height="80" rx="12"
  fill="#d3f9d8" stroke="#22c55e" stroke-width="2.5"/>
<!-- NEW badge -->
<rect x="455" y="70" width="36" height="16" rx="4" fill="#22c55e"/>
<text x="473" y="82" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff"
  font-family="system-ui,-apple-system,sans-serif">NEW</text>
<text x="563" y="103" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">Cognito</text>
<text x="563" y="121" text-anchor="middle" font-size="11" fill="#475569"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">User Pool</text>

<!-- AppSync Events Frontend (Subscribe + Lambda Authorizer) -->
<rect x="865" y="68" width="220" height="80" rx="12"
  fill="#eebefa" stroke="#8b5cf6" stroke-width="2"/>
<text x="975" y="94" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">AppSync Events</text>
<text x="975" y="110" text-anchor="middle" font-size="11" fill="#475569"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">events.subscribe()</text>
<!-- Lambda Authorizer badge inside box -->
<rect x="895" y="120" width="160" height="16" rx="4" fill="#7c3aed"/>
<text x="975" y="132" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">Lambda Authorizer</text>

<!-- API Gateway → Lambda (with JWT verification) -->
<rect x="40" y="280" width="220" height="80" rx="12"
  fill="#d0bfff" stroke="#8b5cf6" stroke-width="2"/>
<text x="150" y="313" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">API Gateway → Lambda</text>
<text x="150" y="331" text-anchor="middle" font-size="11" fill="#475569"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">API Lambda + JWT 検証</text>

<!-- Pre Sign-up Lambda -->
<rect x="453" y="280" width="220" height="80" rx="12"
  fill="#d0bfff" stroke="#8b5cf6" stroke-width="2"/>
<text x="563" y="315" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">Pre Sign-up Lambda</text>
<text x="563" y="333" text-anchor="middle" font-size="11" fill="#475569"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">テナント検証</text>

<!-- SQS -->
<rect x="40" y="469" width="220" height="80" rx="12"
  fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
<text x="150" y="504" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">SQS</text>
<text x="150" y="522" text-anchor="middle" font-size="11" fill="#475569"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">バッファリング</text>

<!-- Event Lambda -->
<rect x="440" y="469" width="220" height="80" rx="12"
  fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
<text x="550" y="504" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">Lambda</text>
<text x="550" y="522" text-anchor="middle" font-size="11" fill="#475569"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">イベント処理</text>

<!-- AppSync Events Backend (IAM Publish) -->
<rect x="865" y="469" width="220" height="80" rx="12"
  fill="#eebefa" stroke="#8b5cf6" stroke-width="2"/>
<text x="975" y="502" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">AppSync Events</text>
<text x="975" y="520" text-anchor="middle" font-size="11" fill="#475569"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">イベント発行 (IAM Publish)</text>

<!-- SQS DLQ -->
<rect x="40" y="637" width="220" height="80" rx="12"
  fill="#ffc9c9" stroke="#ef4444" stroke-width="2"/>
<text x="150" y="673" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">SQS DLQ</text>
<text x="150" y="691" text-anchor="middle" font-size="11" fill="#475569"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">障害対策</text>

<!-- DynamoDB -->
<rect x="440" y="637" width="220" height="80" rx="12"
  fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
<text x="550" y="670" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">DynamoDB</text>
<text x="550" y="688" text-anchor="middle" font-size="10" fill="#0891b2"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">PK=tenantId#userId</text>

<!-- ===== ARROWS ===== -->

<!-- CloudFront → Cognito (green, Login) -->
<line x1="260" y1="108" x2="451" y2="108"
  stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>

<!-- Cognito → Pre Sign-up Lambda (green dashed, trigger) -->
<line x1="563" y1="148" x2="563" y2="278"
  stroke="#22c55e" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowGreen)"/>

<!-- Cognito → AppSync Events Frontend (green dashed, JWT subscribe auth) -->
<line x1="673" y1="108" x2="863" y2="108"
  stroke="#22c55e" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowGreen)"/>

<!-- CloudFront → API Lambda (blue dashed, HTTP sync) -->
<line x1="150" y1="148" x2="150" y2="278"
  stroke="#4a9eed" stroke-width="2.5" stroke-dasharray="8 6" marker-end="url(#arrowBlue)"/>

<!-- API Lambda → SQS (gray, SendMessage) -->
<line x1="150" y1="360" x2="150" y2="448"
  stroke="#475569" stroke-width="2" marker-end="url(#arrowGray)"/>

<!-- SQS → Event Lambda (gray) -->
<line x1="260" y1="509" x2="438" y2="509"
  stroke="#475569" stroke-width="2" marker-end="url(#arrowGray)"/>

<!-- Event Lambda → AppSync Backend (gray, IAM SigV4) -->
<line x1="660" y1="509" x2="863" y2="509"
  stroke="#475569" stroke-width="2" marker-end="url(#arrowGray)"/>

<!-- AppSync Backend → AppSync Frontend (purple dashed, WebSocket Push) -->
<line x1="975" y1="469" x2="975" y2="150"
  stroke="#8b5cf6" stroke-width="2.5" stroke-dasharray="8 6" marker-end="url(#arrowPurple)"/>

<!-- SQS → DLQ (red) -->
<line x1="150" y1="549" x2="150" y2="635"
  stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>

<!-- Event Lambda → DynamoDB (cyan, Write) -->
<line x1="550" y1="549" x2="550" y2="635"
  stroke="#0891b2" stroke-width="2" marker-end="url(#arrowCyan)"/>

<!-- ===== ARROW LABELS ===== -->
<text x="320" y="100" font-size="11" fill="#22c55e"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">Login</text>
<text x="570" y="198" font-size="11" fill="#22c55e"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">Pre Sign-up trigger</text>
<text x="720" y="100" font-size="11" fill="#22c55e"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">JWT (Subscribe)</text>
<text x="160" y="198" font-size="11" fill="#4a9eed"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">HTTP (同期)</text>
<text x="160" y="404" font-size="11" fill="#475569"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">SendMessage</text>
<text x="350" y="501" text-anchor="middle" font-size="11" fill="#475569"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">Dequeue</text>
<text x="762" y="499" text-anchor="middle" font-size="11" fill="#475569"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">IAM (SigV4)</text>
<text x="762" y="519" text-anchor="middle" font-size="9.5" fill="#7c3aed" font-style="italic"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">tickets/orders/{tenantId}/{userId}</text>
<text x="988" y="315" font-size="11" fill="#8b5cf6"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">WebSocket Push</text>
<text x="558" y="598" font-size="11" fill="#0891b2"
  font-family="system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif">Write</text>

</svg>
