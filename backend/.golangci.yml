version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      enable-all: true
    staticcheck:
      # SA: staticcheck, S: gosimple (merged in v2), QF: quickfix
      checks: ["SA", "S", "QF"]
